name: CI / Deploy

# Validates every PR and gates Render deploys on green typecheck.
#
# Triggers:
#   pull_request → typecheck only (no deploy)
#   push to main → typecheck + deploy to production Render service
#   push to dev  → typecheck + deploy to dev Render service
#
# Render's "Auto-Deploy" should be DISABLED in the dashboard for BOTH services
# so deploys only happen through this workflow (one controlled path).
#
# Required GitHub secrets:
#   RENDER_DEPLOY_HOOK_URL      — prod service deploy hook
#   RENDER_DEPLOY_HOOK_URL_DEV  — dev service deploy hook
# Both are found in the Render dashboard:
#   Render → <service> → Settings → Deploy Hook

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  typecheck-frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  typecheck-backend:
    name: Backend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Prisma client generation has no DB dependency — generates types from schema.prisma.
      - run: npm run prisma:generate
      - run: npx tsc --noEmit

  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs: [typecheck-frontend, typecheck-backend]
    # Skip on PR — only deploy on push to a long-lived branch.
    if: github.event_name == 'push'
    steps:
      - name: Trigger Render deploy (production)
        if: github.ref_name == 'main'
        run: |
          curl --fail-with-body --silent --show-error \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Trigger Render deploy (dev)
        if: github.ref_name == 'dev'
        run: |
          curl --fail-with-body --silent --show-error \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL_DEV }}"
