services:
  - type: web
    name: style-assistant-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run start:migrate
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: API_PREFIX
        value: /api
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
